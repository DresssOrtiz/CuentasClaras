services:
  postgres:
    image: postgres:16-alpine
    container_name: cuentas-claras-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cuentas_claras}
      POSTGRES_USER: ${POSTGRES_USER:-cuentas_claras_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-cuentas_claras_user} -d ${POSTGRES_DB:-cuentas_claras}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: cuentas-claras-backend
    restart: unless-stopped
    environment:
      APP_NAME: Cuentas Claras API
      APP_ENV: development
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-cuentas_claras}
      POSTGRES_USER: ${POSTGRES_USER:-cuentas_claras_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://cuentas_claras_user:change_me@postgres:5432/cuentas_claras}
      SUPPORT_STORAGE_PATH: ${SUPPORT_STORAGE_PATH:-/app/storage/supports}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - support_uploads:/app/storage/supports
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: cuentas-claras-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-/api}
      VITE_PROXY_TARGET: ${VITE_PROXY_TARGET:-http://backend:8000}
      FRONTEND_PORT: ${FRONTEND_PORT:-5173}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/usr/src/app
      - frontend_node_modules:/usr/src/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
  support_uploads:
