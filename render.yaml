services:
  - type: web
    name: cuentas-claras-demo-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: Cuentas Claras API
      - key: APP_ENV
        value: demo
      - key: DATABASE_URL
        fromDatabase:
          name: cuentas-claras-demo-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: https://cuentas-claras-demo-frontend.onrender.com
      - key: AUTH_SECRET_KEY
        generateValue: true
      - key: SUPPORT_STORAGE_MODE
        value: mock

  - type: web
    name: cuentas-claras-demo-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://cuentas-claras-demo-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: cuentas-claras-demo-db
    plan: free
    databaseName: cuentas_claras_demo
    postgresMajorVersion: "16"
    ipAllowList: []
